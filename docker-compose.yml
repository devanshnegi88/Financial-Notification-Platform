version: "3.9"

services:
  # ─── Application ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: fnp-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./logs:/var/log/fnp
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - fnp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      sh -c "alembic upgrade head &&
             gunicorn app.main:app
             --workers 4
             --worker-class uvicorn.workers.UvicornWorker
             --bind 0.0.0.0:8000
             --timeout 120
             --keepalive 5
             --access-logfile -
             --error-logfile -"

  # ─── Celery Workers ─────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: fnp-celery-worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./logs:/var/log/fnp
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - fnp-network
    command: >
      celery -A app.celery.celery_app worker
      --loglevel=info
      --concurrency=8
      --queues=notifications,retries,analytics
      --hostname=worker@%h

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: fnp-celery-beat
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./logs:/var/log/fnp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fnp-network
    command: >
      celery -A app.celery.celery_app beat
      --loglevel=info
      --scheduler=celery.schedulers:PersistentScheduler

  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: fnp-flower
    restart: unless-stopped
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery-worker
    networks:
      - fnp-network
    command: >
      celery -A app.celery.celery_app flower
      --port=5555
      --basic_auth=admin:admin_flower_password

  # ─── Kafka Consumer ─────────────────────────────────────────────────────────
  kafka-consumer:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: fnp-kafka-consumer
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./logs:/var/log/fnp
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - fnp-network
    command: python -m app.kafka.consumer

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: fnp-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-fnp_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-fnp_rabbit_password_change_me}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - fnp-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── RabbitMQ Consumer ──────────────────────────────────────────────────────
  rabbitmq-consumer:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: fnp-rabbitmq-consumer
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./logs:/var/log/fnp
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fnp-network
    command: python -m app.rabbitmq.consumer

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fnp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financial_notifications}
      POSTGRES_USER: ${POSTGRES_USER:-fnp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fnp_secure_password_change_me}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    networks:
      - fnp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fnp_user} -d ${POSTGRES_DB:-financial_notifications}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fnp-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secure_password_change_me}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - fnp-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_password_change_me}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka ──────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: fnp-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - fnp-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fnp-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "29092:29092"
    networks:
      - fnp-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fnp-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: fnp-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8080:8080"
    networks:
      - fnp-network

  # ─── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: fnp-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-logs:/var/log/nginx
    networks:
      - fnp-network

networks:
  fnp-network:
    driver: bridge
    name: fnp-network

volumes:
  postgres-data:
    name: fnp-postgres-data
  redis-data:
    name: fnp-redis-data
  kafka-data:
    name: fnp-kafka-data
  zookeeper-data:
    name: fnp-zookeeper-data
  zookeeper-logs:
    name: fnp-zookeeper-logs
  nginx-logs:
    name: fnp-nginx-logs
  rabbitmq-data:
    name: fnp-rabbitmq-data
