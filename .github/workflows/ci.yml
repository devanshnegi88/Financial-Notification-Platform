name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  POSTGRES_DB: fnp_test
  POSTGRES_USER: fnp_user
  POSTGRES_PASSWORD: test_password
  DATABASE_URL: postgresql+asyncpg://fnp_user:test_password@localhost:5432/fnp_test
  REDIS_URL: redis://localhost:6379/0
  REDIS_PASSWORD: ""
  APP_SECRET_KEY: test-secret-key-for-ci-minimum-32-characters
  JWT_SECRET_KEY: test-jwt-secret-key-for-ci-minimum-32-chars
  POSTGRES_HOST: localhost
  POSTGRES_PORT: "5432"
  RABBITMQ_URL: amqp://guest:guest@localhost:5672/
  RABBITMQ_HOST: localhost
  RABBITMQ_USER: guest
  RABBITMQ_PASSWORD: guest
  KAFKA_BOOTSTRAP_SERVERS: localhost:9092

jobs:
  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: |
          pip install black==24.4.2 isort==5.13.2 flake8==7.0.0

      - name: Run black (format check)
        run: black --check --diff app/ tests/

      - name: Run isort (import order check)
        run: isort --check-only --diff app/ tests/

      - name: Run flake8 (style check)
        run: flake8 app/ tests/ --max-line-length=120 --extend-ignore=E203,W503

  # ── Unit Tests ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage-unit.xml \
            --tb=short \
            -x
        env:
          APP_SECRET_KEY: ${{ env.APP_SECRET_KEY }}
          JWT_SECRET_KEY: ${{ env.JWT_SECRET_KEY }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          RABBITMQ_URL: ${{ env.RABBITMQ_URL }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.xml

  # ── Integration Tests ──────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fnp_test
          POSTGRES_USER: fnp_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.12-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          APP_SECRET_KEY: ${{ env.APP_SECRET_KEY }}
          JWT_SECRET_KEY: ${{ env.JWT_SECRET_KEY }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          REDIS_URL: ${{ env.REDIS_URL }}
          REDIS_PASSWORD: ""
          RABBITMQ_URL: ${{ env.RABBITMQ_URL }}
          RABBITMQ_HOST: ${{ env.RABBITMQ_HOST }}
          RABBITMQ_USER: ${{ env.RABBITMQ_USER }}
          RABBITMQ_PASSWORD: ${{ env.RABBITMQ_PASSWORD }}
          KAFKA_BOOTSTRAP_SERVERS: ${{ env.KAFKA_BOOTSTRAP_SERVERS }}

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage-integration.xml \
            --tb=short \
            -x
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          APP_SECRET_KEY: ${{ env.APP_SECRET_KEY }}
          JWT_SECRET_KEY: ${{ env.JWT_SECRET_KEY }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          REDIS_URL: ${{ env.REDIS_URL }}
          REDIS_PASSWORD: ""
          RABBITMQ_URL: ${{ env.RABBITMQ_URL }}
          RABBITMQ_HOST: ${{ env.RABBITMQ_HOST }}
          RABBITMQ_USER: ${{ env.RABBITMQ_USER }}
          RABBITMQ_PASSWORD: ${{ env.RABBITMQ_PASSWORD }}
          KAFKA_BOOTSTRAP_SERVERS: ${{ env.KAFKA_BOOTSTRAP_SERVERS }}
          FIRST_SUPERUSER_EMAIL: superadmin@test.com
          FIRST_SUPERUSER_PASSWORD: SuperAdmin123
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: Admin123

      - name: Upload integration test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.xml

  # ── Coverage Report ────────────────────────────────────────────────────────
  coverage:
    name: Coverage Report
    runs-on: ubuntu-22.04
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage-unit.xml,coverage-integration.xml
          fail_ci_if_error: false

  # ── Build Docker Image ─────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-22.04
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: false
          tags: financial-notification-platform:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check image size
        run: |
          SIZE=$(docker image inspect financial-notification-platform:${{ github.sha }} --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ $SIZE_MB -gt 800 ]; then
            echo "Warning: Image size ${SIZE_MB}MB exceeds 800MB"
          fi

  # ── Security Scan ──────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install pip-audit bandit

      - name: Run pip-audit (dependency vulnerability scan)
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969
        continue-on-error: true

      - name: Run bandit (code security scan)
        run: |
          bandit -r app/ \
            -x app/tests \
            --severity-level medium \
            --confidence-level medium \
            -f json \
            -o bandit-report.json || true
          bandit -r app/ \
            -x app/tests \
            --severity-level medium \
            --confidence-level medium

      - name: Check for secrets in codebase
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: bandit-report.json
